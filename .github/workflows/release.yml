name: Publicación de Versión (Firma y Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Compilar, Firmar y Empaquetar
      shell: pwsh
      env:
        MY_GITHUB_SECRET_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      run: |
        ./.deploys/BUILD_AND_SIGN.ps1

    - name: Crear GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # Busca dinámicamente cualquier ZIP generado en la raíz
        files: |
          *-Windows.zip
          *.zip
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}